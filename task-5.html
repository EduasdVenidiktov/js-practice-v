<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <!-- Дуже важливі для повноекранного режиму -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Для standalone / fullscreen режиму -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="theme-color" content="#e3e2d5" />

    <link rel="manifest" href="./manifest.json" />

    <link rel="stylesheet" href="css/task-6.css" />
  </head>

  <body>
    <div class="marquee-viewport">
      <p id="running-line">
        Документ оновлено о 21:53 | 24.02.2026 • Документ оновлено о 22:53 |
        24.02.2026 •
      </p>
    </div>

    <button
      id="installBtn"
      style="
        display: none;
        position: fixed;
        bottom: 20px;
        left: 20px;
        padding: 12px 20px;
        background: #e3e2d5;
        border: none;
        border-radius: 8px;
        font-size: 16px;
      "
    >
      Встановити додаток
    </button>

    <script src="./js/task-6.js" type="module"></script>
  </body>
</html>
